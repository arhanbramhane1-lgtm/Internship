<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Image Gallery</title>
    <link rel="stylesheet" href="img.css">
</head>
<body>

    <h1>My Gallery</h1>

    <div class="gallery">

        <div class="item">
            <img src="https://picsum.photos/500/500?1" alt="Image 1">
            <div class="overlay">Nature</div>
        </div>

        <div class="item tall">
            <img src="https://picsum.photos/500/700?2" alt="Image 2">
            <div class="overlay">Mountains</div>
        </div>

        <div class="item">
            <img src="https://picsum.photos/500/500?3" alt="Image 3">
            <div class="overlay">Beach</div>
        </div>

        <div class="item wide">
            <img src="https://picsum.photos/700/500?4" alt="Image 4">
            <div class="overlay">City</div>
        </div>

        <div class="item">
            <img src="https://picsum.photos/500/500?5" alt="Image 5">
            <div class="overlay">Forest</div>
        </div>

        <div class="item">
            <img src="https://picsum.photos/500/500?6" alt="Image 6">
            <div class="overlay">Sunset</div>
        </div>

        <div class="item">
            <img src="https://picsum.photos/500/500?7" alt="Image 7">
            <div class="overlay">Adventure</div>
        </div>

        <div class="item wide">
            <img src="https://picsum.photos/700/500?8" alt="Image 8">
            <div class="overlay">Travel</div>
        </div>

        <div class="item">
            <img src="https://picsum.photos/500/500?9" alt="Image 9">
            <div class="overlay">Ocean</div>
        </div>

    </div>

</body>
</html>
