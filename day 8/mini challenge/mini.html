<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator & BMI Calculator</title>

    <link rel="stylesheet" href="mini.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Header -->
    <header>

        <div class="logo">
            <i class="fa-solid fa-calculator"></i>
            <h2>Smart Calculator</h2>
        </div>

        <div class="datetime">
            <h3 id="date"></h3>
            <p id="time"></p>
        </div>

        <button id="themeBtn">
            <i class="fa-solid fa-moon"></i>
        </button>

    </header>


    <!-- Main Section -->

    <section class="main">

        <!-- Calculator -->

        <div class="calculator">

            <h2>Calculator</h2>

            <input
            type="text"
            id="display"
            readonly
            placeholder="0">

            <div class="buttons">

                <button class="operator" onclick="clearDisplay()">AC</button>
                <button class="operator" onclick="deleteLast()">DEL</button>
                <button class="operator" onclick="append('%')">%</button>
                <button class="operator" onclick="append('/')">÷</button>

                <button onclick="append('7')">7</button>
                <button onclick="append('8')">8</button>
                <button onclick="append('9')">9</button>
                <button class="operator" onclick="append('*')">×</button>

                <button onclick="append('4')">4</button>
                <button onclick="append('5')">5</button>
                <button onclick="append('6')">6</button>
                <button class="operator" onclick="append('-')">−</button>

                <button onclick="append('1')">1</button>
                <button onclick="append('2')">2</button>
                <button onclick="append('3')">3</button>
                <button class="operator" onclick="append('+')">+</button>

                <button onclick="append('0')">0</button>
                <button onclick="append('.')">.</button>

                <button class="equal" onclick="calculate()">=</button>

            </div>

        </div>


        <!-- BMI Calculator -->

        <div class="bmi-card">

            <h2>BMI Calculator</h2>

            <div class="input-box">

                <label>Height (cm)</label>

                <input
                type="number"
                id="height"
                placeholder="Enter Height">

            </div>

            <div class="input-box">

                <label>Weight (kg)</label>

                <input
                type="number"
                id="weight"
                placeholder="Enter Weight">

            </div>

            <button class="bmi-btn"
            onclick="calculateBMI()">

                Calculate BMI

            </button>

            <div class="result">

                <h3 id="bmiValue">0.00</h3>

                <p id="bmiStatus">
                    Your BMI Result
                </p>

            </div>

        </div>

    </section>

</div>

<script src="mini.js"></script>

</body>
</html>
