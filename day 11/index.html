<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DOM Manipulation Playground</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="background"></div>

    <header>

        <h1>DOM Manipulation Playground</h1>

        <p>Counter • Color Generator • Password Generator</p>

    </header>

    <main class="container">

        <!-- Counter -->

        <section class="card">

            <div class="icon">

                <i class="fa-solid fa-calculator"></i>

            </div>

            <h2>Counter App</h2>

            <h1 id="counterValue">0</h1>

            <div class="button-group">

                <button id="decreaseBtn">

                    <i class="fa-solid fa-minus"></i>

                </button>

                <button id="resetBtn">

                    Reset

                </button>

                <button id="increaseBtn">

                    <i class="fa-solid fa-plus"></i>

                </button>

            </div>

            <div class="progress">

                <div id="progressBar"></div>

            </div>

        </section>

        <!-- Color Generator -->

       <!-- Color Generator -->

<section class="card">

    <div class="icon">
        <i class="fa-solid fa-palette"></i>
    </div>

    <h2>Gradient Generator</h2>

    <div class="color-preview" id="colorPreview"></div>

    <div class="picker-group">

        <div>
            <label>Color 1</label>
            <input type="color" id="color1" value="#6C63FF">
        </div>

        <div>
            <label>Color 2</label>
            <input type="color" id="color2" value="#00D4FF">
        </div>

    </div>

    <p id="colorCode">
        linear-gradient(135deg, #6C63FF, #00D4FF)
    </p>

    <button id="applyGradient">
        Apply Gradient
    </button>

    <button id="generateColor">
        Random Gradient
    </button>

    <button id="copyColor">
        Copy CSS
    </button>

</section>
        <!-- Password -->

        <section class="card">

            <div class="icon">

                <i class="fa-solid fa-lock"></i>

            </div>

            <h2>Password Generator</h2>

            <input type="text"
                id="password"
                readonly>

            <div class="slider-box">

                <span>Length</span>

                <span id="lengthValue">12</span>

            </div>

            <input
                type="range"
                id="length"
                min="8"
                max="32"
                value="12">

            <div class="options">

                <label>

                    <input type="checkbox" id="uppercase" checked>

                    Uppercase

                </label>

                <label>

                    <input type="checkbox" id="lowercase" checked>

                    Lowercase

                </label>

                <label>

                    <input type="checkbox" id="numbers" checked>

                    Numbers

                </label>

                <label>

                    <input type="checkbox" id="symbols" checked>

                    Symbols

                </label>

            </div>

            <button id="generatePassword">

                Generate Password

            </button>

            <button id="copyPassword">

                Copy Password

            </button>

            <div class="strength">

                <div id="strengthBar"></div>

            </div>

            <p id="strengthText">

                Strong Password

            </p>

        </section>

    </main>

    <div id="toast">

        Copied Successfully

    </div>

    <footer>

        Made with ❤️ using HTML, CSS & JavaScript

    </footer>

    <script src="script.js"></script>

</body>

</html>
